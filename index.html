<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V&J — Dovanų Kortelė</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:  #C9A84C;
      --black: #1A1A1A;
      --cream: #F7F3EC;
      --grey:  #E8E8E8;
      --gt:    #999;
      --white: #FFFFFF;
      --bg:    #FAF8F5;
    }

    body {
      background: var(--bg);
      font-family: "Montserrat", sans-serif;
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px 100px;
    }

    /* ── Form header ── */
    header { text-align: center; margin-bottom: 40px; }
    header img { max-height: 68px; max-width: 260px; object-fit: contain; display: block; margin: 0 auto 8px; }
    header .subline { font-size: 9.5px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gt); }
    .gold-rule { width: 40px; height: 1px; background: var(--gold); margin: 12px auto 0; }

    /* ── Form card ── */
    .card {
      background: var(--white);
      width: 100%;
      max-width: 500px;
      border-top: 2px solid var(--gold);
      padding: 42px 48px 52px;
      box-shadow: 0 8px 60px rgba(0,0,0,.06);
    }
    @media (max-width: 540px) { .card { padding: 30px 22px 40px; } }

    .card-eyebrow {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold);
      text-align: center; margin-bottom: 36px;
    }

    .field { margin-bottom: 28px; }
    .field label {
      display: block; font-size: 9.5px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gt); margin-bottom: 8px;
    }
    .field input[type=text],
    .field input[type=number],
    .field input[type=date],
    .field textarea {
      width: 100%; border: none; border-bottom: 1px solid var(--grey);
      background: transparent; font-family: "Montserrat", sans-serif;
      font-size: 14px; color: var(--black); padding: 10px 0;
      outline: none; transition: border-color .2s;
      -webkit-appearance: none; appearance: none; border-radius: 0;
    }
    .field input:focus, .field textarea:focus { border-bottom-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 76px; line-height: 1.65; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; }
    @media (max-width: 430px) { .row2 { grid-template-columns: 1fr; } }

    .euro-w { position: relative; }
    .euro-w .sym { position: absolute; left: 0; bottom: 10px; font-size: 14px; color: var(--gold); font-weight: 500; }
    .euro-w input { padding-left: 16px !important; }

    .btn {
      display: block; width: 100%; margin-top: 40px; padding: 18px;
      background: var(--black); color: var(--white);
      font-family: "Montserrat", sans-serif;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase;
      border: none; cursor: pointer; transition: background .2s;
    }
    .btn:hover { background: var(--gold); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .req { color: var(--gold); }
    .opt { font-weight: 300; text-transform: none; letter-spacing: 0; font-size: 10px; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--black); color: var(--white);
      font-size: 11.5px; letter-spacing: .09em;
      padding: 14px 28px; opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


    
    /* ══════════════════════════════════════════
       PDF GIFT CARD
    ══════════════════════════════════════════ */
    #gift-card {
      position: absolute;
      left: -14000px;
      top: 0;
      width: 680px;
      height: 420px;
      background: #F5F0E8;
      font-family: "Montserrat", sans-serif;
      color: #2C2420;
    }
    .gc-wrap {
      width: 100%;
      height: 100%;
      padding: 26px 42px 22px 42px;
      display: flex;
      flex-direction: column;
      border: 1px solid #C9A84C;
      box-sizing: border-box;
    }
    /* Top: logo right */
    .gc-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .gc-logo-wrap img {
      max-height: 90px;
      max-width: 220px;
      object-fit: contain;
    }
    /* Heading */
    .gc-heading { line-height: 1; }
    .gc-title-caps {
      font-family: "Playfair Display", serif;
      font-weight: 400;
      font-size: 42px;
      color: #2C2420;
    }
    .gc-title-italic {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 400;
      font-size: 42px;
      color: #2C2420;
    }
    /* Gold rule — paslėptas */
    .gc-rule { display: none; }
    /* Fields: label above, value below with underline */
    .gc-field { margin-bottom: 10px; }
    .gc-field-lbl {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #A89880;
      margin-bottom: 2px;
    }
    .gc-field-val {
      font-family: "Playfair Display", serif;
      font-size: 20px;
      font-weight: 400;
      color: #2C2420;
      border-bottom: 1px solid #C8B99A;
      padding-bottom: 4px;
      min-height: 30px;
    }
    .gc-row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 48px;
      margin-bottom: 10px;
    }
    .gc-amount-val {
      font-family: "Playfair Display", serif;
      font-size: 32px;
      font-weight: 400;
      color: #C9A84C;
      border-bottom: 1px solid #C8B99A;
      padding-bottom: 2px;
      line-height: 1.1;
    }
    .gc-spacer { flex: 1; }
    /* Contact bottom left */
    .gc-contact {
      font-size: 9px;
      font-weight: 400;
      color: #555;
      line-height: 1.75;
    }
    .gc-contact strong { font-weight: 600; font-size: 9.5px; }
    /* Nr bottom right */
    .gc-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .gc-nr-lbl {
      font-family: "Montserrat", sans-serif;
      font-size: 9px;
      font-weight: 500;
      color: #2C2420;
      white-space: nowrap;
    }
    .gc-nr-val {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #888;
    }
  
  </style>
</head>

      <div class="gc-rule"></div>

      <div class="gc-field">
        <div class="gc-field-lbl">Gerb.</div>
        <div class="gc-field-val" id="gcTo"></div>
      </div>

      <div class="gc-field">
        <div class="gc-field-lbl">Dovanojama</div>
        <div class="gc-field-val" id="gcDovanojama"></div>
      </div>

      <div class="gc-row2">
        <div class="gc-field" style="margin-bottom:0">
          <div class="gc-field-lbl">Kupono vert&#279;</div>
          <div class="gc-amount-val" id="gcAmount"></div>
        </div>
        <div class="gc-field" style="margin-bottom:0">
          <div class="gc-field-lbl">Galioja iki</div>
          <div class="gc-field-val" id="gcExpiry"></div>
        </div>
      </div>

      <div class="gc-spacer"></div>

      <div class="gc-bottom">
        <div class="gc-contact">
          <strong>U&#382;sakymams ir informacijai:</strong><br>
          &#9990; Tel.: +370 686 22 470<br>
          &#9679; Adresas: Savanori&#371; pr. 194 &middot; 208 kab., Kaunas
        </div>
        <div style="font-size:8px;font-weight:300;letter-spacing:0.18em;color:#C8B99A;text-align:right" id="gcNo"></div>
      </div>

    </div>
  </div>


  <script>
  (function () {
    "use strict";
    const pad = n => String(n).padStart(2, "0");

    const exp = new Date();
    exp.setFullYear(exp.getFullYear() + 1);
    document.getElementById("expiryDate").value =
      exp.getFullYear()+"-"+pad(exp.getMonth()+1)+"-"+pad(exp.getDate());

    function fmtDate(iso) {
      const [y,m,d] = iso.split("-"); return d+"."+m+"."+y;
    }
    function genNo() {
      const n = new Date();
      return "VJ-DK-"+n.getFullYear()+pad(n.getMonth()+1)+pad(n.getDate())+"-"+Math.floor(1000+Math.random()*9000);
    }
    function toast(msg, ms=4000) {
      const el = document.getElementById("toast");
      el.textContent = msg; el.classList.add("show");
      setTimeout(()=>el.classList.remove("show"), ms);
    }

    document.getElementById("gcForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const toName     = document.getElementById("toName").value.trim();
      const dovanojama = document.getElementById("dovanojama").value.trim();
      const amount     = document.getElementById("amount").value.trim();
      const expiry     = document.getElementById("expiryDate").value;

      if (!toName || !amount || !expiry) {
        toast("Prašome užpildyti visus privalomus laukus."); return;
      }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.textContent = "Generuojama…";

      try {
        const no = genNo();
        document.getElementById("gcTo").textContent          = toName;
        document.getElementById("gcDovanojama").textContent  = dovanojama;
        document.getElementById("gcAmount").textContent      = "€"+parseFloat(amount).toFixed(2);
        document.getElementById("gcExpiry").textContent      = fmtDate(expiry);
        document.getElementById("gcNo").textContent          = "Nr. "+no;

        await document.fonts.ready;
        await new Promise(r=>setTimeout(r,400));

        const el = document.getElementById("gift-card");
        const canvas = await html2canvas(el, {
          scale: 2, useCORS: true, allowTaint: true,
          backgroundColor: "#F5F0E8",
          logging: false,
          windowWidth: el.scrollWidth, windowHeight: el.scrollHeight,
        });

        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL("image/jpeg", 0.97);
        const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:"a6" });
        const pw = pdf.internal.pageSize.getWidth();
        const ph = pdf.internal.pageSize.getHeight();
        // Fill entire page with cream so no white borders show
        pdf.setFillColor(245, 240, 232);
        pdf.rect(0, 0, pw, ph, "F");
        pdf.addImage(imgData,"JPEG", 0, 0, pw, ph);
        pdf.save("dovanu-kortele-"+no+".pdf");
        toast("Kortelė "+no+" sukurta!");

        // Išsaugoti į Google Sheets
        const today = new Date();
        const generated = pad(today.getDate())+"."+pad(today.getMonth()+1)+"."+today.getFullYear();
        fetch("https://script.google.com/macros/s/AKfycbwYCn2xlJ0bHrxMHNZ3tqKvHO0dBD0aQpnoIqVMZhWvHcOjED93D91jyPX6dcWxJjszjA/exec", {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            no,
            to: toName,
            amount: "€"+parseFloat(amount).toFixed(2),
            expiry: fmtDate(expiry),
            generated
          })
        }).catch(() => {}); // tylusis fail — PDF jau išsaugotas

      } catch(err) {
        console.error(err); toast("Klaida. Bandykite dar kartą.");
      } finally {
        btn.disabled=false; btn.textContent="Generuoti dovanų kortelę";
      }
    });
  })();
  </script>
